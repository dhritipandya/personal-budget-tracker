<!DOCTYPE html>
<html>
<head>
<title>Personal Budget Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Dashboard</h1>

<div class="summary">

<div class="card income">
<h3>Total Income</h3>
<p id="income">$0</p>
</div>

<div class="card expense">
<h3>Total Expenses</h3>
<p id="expense">$0</p>
</div>

<div class="card balance">
<h3>Net Balance</h3>
<p id="balance">$0</p>
</div>

</div>

<h2>Quick Add Transaction</h2>

<form id="transactionForm">

<input type="text" id="title" placeholder="Title/Description" required>

<input type="number" id="amount" placeholder="Amount" required>

<input type="date" id="date" required>

<select id="category">
<option>Food</option>
<option>Bills</option>
<option>Entertainment</option>
<option>Shopping</option>
<option>Other</option>
</select>

<div class="radio-group">
<label><input type="radio" name="type" value="Income" checked> Income</label>
<label><input type="radio" name="type" value="Expense"> Expense</label>
</div>

<button type="submit">Add Transaction</button>

</form>

<h2>All Transactions</h2>

<table>

<thead>
<tr>
<th>Title</th>
<th>Amount</th>
<th>Date</th>
<th>Category</th>
<th>Type</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="transactionTable">

</tbody>

</table>

<script src="script.js"></script>

</body>
</html>
